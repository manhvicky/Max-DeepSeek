services:
  max-deepseek:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: max-deepseek:latest
    container_name: max-deepseek
    restart: unless-stopped
    ports:
      - "22218:22218"
    volumes:
      - ./data:/app/data
    env_file:
      - ../.env
    environment:
      - DATA_DIR=/app/data
      # Values in ../.env are optional; these defaults keep Docker Compose one-command friendly.
