name: Bug report
description: Báo cáo lỗi để tái hiện và sửa nhanh hơn
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Cảm ơn bạn đã báo cáo lỗi. Vui lòng điền đủ thông tin để dễ tái hiện.
  - type: input
    id: version
    attributes:
      label: Phiên bản
      description: Ví dụ 1.0.0, commit hash hoặc Docker image tag
      placeholder: v1.0.0
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Mô tả ngắn
      placeholder: Lỗi xảy ra là gì?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Cách tái hiện
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Kết quả mong đợi
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Kết quả thực tế
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log hoặc screenshot liên quan
      render: shell
  - type: dropdown
    id: deployment
    attributes:
      label: Cách deploy
      options:
        - Docker Compose
        - Local backend + web dev
        - Khác
    validations:
      required: true
