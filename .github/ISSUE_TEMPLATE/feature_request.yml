name: Feature request
description: Đề xuất tính năng hoặc cải tiến cho Max-DeepSeek
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Vấn đề hiện tại
      placeholder: Bạn đang gặp hạn chế gì?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Đề xuất giải pháp
      placeholder: Bạn muốn Max-DeepSeek hoạt động như thế nào?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Giải pháp thay thế đã cân nhắc
  - type: textarea
    id: extra
    attributes:
      label: Bổ sung
      placeholder: Mockup, API, use case, deployment note...
